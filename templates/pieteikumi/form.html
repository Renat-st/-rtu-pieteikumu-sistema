<!DOCTYPE html>
<html>
<head><title>{{ title }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3>{{ title }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nosaukums</label>
                            <input type="text" name="nosaukums" class="form-control" 
                                   value="{{ pieteikums.nosaukums|default:'' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apraksts</label>
                            <textarea name="apraksts" class="form-control" rows="5">{{ pieteikums.apraksts|default:'' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Statuss</label>
                            <select name="statuss" class="form-select">
                                <option value="NEW" {% if pieteikums.statuss == "NEW" %}selected{% endif %}>NEW</option>
                                <option value="IN_PROGRESS" {% if pieteikums.statuss == "IN_PROGRESS" %}selected{% endif %}>IN_PROGRESS</option>
                                <option value="DONE" {% if pieteikums.statuss == "DONE" %}selected{% endif %}>DONE</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">Saglabāt</button>
                        <a href="/" class="btn btn-secondary ms-2">Atpakaļ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
